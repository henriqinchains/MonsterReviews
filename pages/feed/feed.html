<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contador de Monster</title>
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="feed.css" />
  </head>
  <body>
    <!-- ═══════════════ NAV ═══════════════ -->
    <nav>
      <span class="nav-logo">MONSTER REVIEWS</span>

      <div class="nav-links">
        <a href="#" class="active">Feed</a>
        <a href="#">Estatísticas</a>
      </div>

      <!-- Registrar Latinha button -->

      <!-- User dropdown -->
      <div class="nav-user" id="navUser">
        <div class="user-trigger" onclick="toggleDropdown()">
          <div class="user-avatar">JD</div>
          <span class="user-name">João D.</span>
          <svg class="chevron" viewBox="0 0 24 24">
            <polyline points="6 9 12 15 18 9" />
          </svg>
        </div>

        <div class="user-dropdown">
          <div class="dropdown-header">
            <strong></strong>
            <span>'${loggedUser}'</span>
          </div>
          <div class="dropdown-item">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
              <circle cx="12" cy="7" r="4" />
            </svg>
            Meu Perfil
          </div>
          <div class="dropdown-item">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <circle cx="12" cy="12" r="3" />
              <path
                d="M19.07 4.93A10 10 0 1 0 4.93 19.07 10 10 0 0 0 19.07 4.93z"
              />
            </svg>
            Configurações
          </div>
          <div class="dropdown-item">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M18 8h1a4 4 0 0 1 0 8h-1" />
              <path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z" />
              <line x1="6" y1="1" x2="6" y2="4" />
              <line x1="10" y1="1" x2="10" y2="4" />
              <line x1="14" y1="1" x2="14" y2="4" />
            </svg>
            Plano Pro
          </div>
          <div class="dropdown-sep"></div>
          <div id="btnSairFeed" class="dropdown-item danger">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
              <polyline points="16 17 21 12 16 7" />
              <line x1="21" y1="12" x2="9" y2="12" />
            </svg>
            Sair
          </div>
        </div>
      </div>
    </nav>

    <!-- ═══════════════ PAGE ═══════════════ -->
    <div class="page">
      <!-- ── TIMELINE (left) ── -->
      <section class="timeline">
        <div class="timeline-header">
          <h2>Timeline</h2>
          <button class="btn-registrar">Registrar latinha</button>
        </div>

        <div class="feed-container" id="feed-container"></div>
        <!-- /feed-container -->
      </section>

      <!-- ── RIGHT COLUMN ── -->
      <div class="right-col">
        <!-- Panel -->
        <div class="panel">
          <div class="panel-header">
            <h3>Liderança</h3>
            <span class="badge">Ao vivo</span>
          </div>
          <div class="panel-body" id="ranking-container">
            <p style="text-align: center; color: #888">
              Calculando latinhas...
            </p>
          </div>
        </div>

        <!-- Filter Form -->
        <div class="filter-form">
          <div class="filter-header">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3" />
            </svg>
            <h3>Filtros</h3>
          </div>
          <div class="filter-body">
            <div class="field">
              <label>Buscar</label>
              <input type="text" placeholder="Sabor, marca…" />
            </div>
            <div class="field">
              <label>Categoria</label>
              <div class="select-wrap">
                <select>
                  <option>Todas as categorias</option>
                  <option>Pilsen</option>
                  <option>IPA</option>
                  <option>Weiss</option>
                  <option>Dark Lager</option>
                  <option>Zero Álcool</option>
                  <option>Seltzer</option>
                </select>
              </div>
            </div>
            <div class="field">
              <label>Período</label>
              <div class="date-row">
                <input type="date" />
                <input type="date" />
              </div>
            </div>
            <div class="field">
              <label>Valeu a pena?</label>
              <div class="tag-group" id="tagGroup">
                <span class="tag active" onclick="toggleTag(this)">Todos</span>
                <span class="tag" onclick="toggleTag(this)">✓ Sim</span>
                <span class="tag" onclick="toggleTag(this)">✗ Não</span>
              </div>
            </div>
            <div class="field">
              <label>Ordenar por</label>
              <div class="select-wrap">
                <select>
                  <option>Mais recentes</option>
                  <option>Melhor nota</option>
                  <option>Menor preço</option>
                  <option>Mais curtidos</option>
                </select>
              </div>
            </div>
            <div class="btn-group">
              <button class="btn btn-ghost">Limpar</button>
              <button class="btn btn-primary">Aplicar</button>
            </div>
          </div>
        </div>
      </div>
      <!-- /right-col -->
    </div>
    <!-- /page -->
    <script>
      document
        .getElementById("btnSairFeed")
        .addEventListener("click", (event) => {
          event.preventDefault(); // impede qualquer submit acidental
          localStorage.removeItem("authToken");
          localStorage.removeItem("loggedUser");
          window.location.href = "../login/login.html";
        });
    </script>
    <script src="feed.js" defer></script>
  </body>
</html>
