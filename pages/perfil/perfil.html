<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contador de Monster</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nova+Square&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="index.css" />
    <link rel="icon" href="/src/img/monster.png" />
  </head>
  <body>
    <nav>
      <span class="nav-logo">MONSTER REVIEWS</span>

      <div class="nav-links">
        <a href="../../index.html">Feed</a>
        <a href="#" class="active">Perfil e Estatísticas</a>
        <a href="#">Torneio (em breve)</a>
      </div>

      <div class="nav-user" id="navUser">
        <div class="user-trigger" onclick="toggleDropdown()">
          <div class="user-avatar"></div>
          <span id="loggedUser">Usuário</span>
          <svg class="chevron" viewBox="0 0 24 24">
            <polyline points="6 9 12 15 18 9" />
          </svg>
        </div>
        <div class="user-dropdown">
          <div class="dropdown-header">
            <strong id="loggedUserEmail"></strong>
            <span></span>
          </div>
          <div class="dropdown-item">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
              <circle cx="12" cy="7" r="4" />
            </svg>
            Meu Perfil
          </div>
          <div class="dropdown-sep"></div>
          <div id="btnSair" class="dropdown-item danger">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
              <polyline points="16 17 21 12 16 7" />
              <line x1="21" y1="12" x2="9" y2="12" />
            </svg>
            Sair
          </div>
        </div>
      </div>
    </nav>
    <script src="index.js" defer></script>
    <script>
      // O evento de Sair fica aqui de forma limpa e isolada
      document
        .getElementById("btnSair")
        .addEventListener("click", (event) => {
          event.preventDefault();
          localStorage.removeItem("authToken");
          localStorage.removeItem("loggedUser");
          localStorage.removeItem("loggedEmail");
          window.location.href = "./pages/login/login.html";
        });
    </script>
  </body>
</html>
