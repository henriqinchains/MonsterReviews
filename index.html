  <!doctype html>
  <html lang="pt-BR">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>Contador de Monster</title>
      <link rel="icon" href="src/img/monster.png" />
      <link rel="stylesheet" href="index.css" />
    </head>
    <body>
      <main class="page">
        <section class="panel">
          <div class="hero">
            <h1>Contador de Monster</h1>
            <p>
              Registre sua avaliação do Monster com nota de 0 a 10, escolha o
              sabor, envie uma foto, deixe uma review opcional e informe o valor.
            </p>
          </div>

          <form id="formAvaliacao">
            <div class="grid grid-two">
              <label>
                O cabra
                <select name="sujeito" required>
                  <option value="">Selecione o caboclo</option>
                  <option value="Meira">Meira</option>
                  <option value="Francis">Francis</option>
                </select>
              </label>

              <label>
                Sabor do Monster
                <select name="sabor" placeholder="Ex: Ultra Paradise" required>
                  <option value="">Selecione um sabor</option>
                  <option value="branco">Branco</option>
                  <option value="mangoLoco">Mango Loco</option>
                  <option value="pacificPunch">Pacific Punch</option>
                  <option value="peachyKeen">Peachy Keen</option>
                  <option value="rioPunch">Rio Punch</option>
                  <option value="ultraFiestaMango">Ultra Fiesta Mango</option>
                  <option value="ultraStrawberry">Ultra Strawberry Dreams</option>
                  <option value="ultraViolet">Ultra Violet</option>
                  <option value="watermelon">Watermelon</option>
                  <option value="outro">Outro (anotar no grupo)</option>
                </select>
              </label>
            </div>

            <div class="grid grid-two">
              <label>
                Valor
                <input
                  type="number"
                  name="valor"
                  step="0.01"
                  placeholder="R$12,99"
                  required
                />
              </label>

              <label>
                Nota (0 a 10)
                <input
                  type="number"
                  name="nota"
                  min="0"
                  max="10"
                  step="0.01"
                  placeholder="8.5"
                  required
                />
              </label>
            </div>

            <div class="grid grid-two">
              <fieldset class="radio-group">
                <legend>Valeu a pena?</legend>
                <label>
                  <input type="radio" name="valeu" value="sim" required />
                  Sim
                </label>
                <label>
                  <input type="radio" name="valeu" value="nao" required />
                  Não
                </label>
              </fieldset>
              <label>
                Foto do Monster
                <input type="file" name="foto" accept="image/*" required />
              </label>
            </div>

            <label>
              Review (opcional)
              <textarea
                name="review"
                placeholder="Conte o que achou do sabor, energia e sensação geral..."
              ></textarea>
            </label>

            <div class="footer">
              <button class="button" type="button" id="btnSair">Sair</button>
              <div class="hint">Rumo a 1k gastos em monsters!</div>
              <button class="button" type="submit" id="btnSubmit">
                Enviar avaliação
              </button>
            </div>
          </form>
        </section>
        <script src="index.js"></script>
        <script>
          document
            .getElementById("btnSair")
            .addEventListener("click", (event) => {
              event.preventDefault(); // impede qualquer submit acidental
              localStorage.removeItem("authToken");
              localStorage.removeItem("loggedUser");
              window.location.href = "pages\\login\\login.html";
            });
        </script>
      </main>
    </body>
  </html>
