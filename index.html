<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contador de Monster</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nova+Square&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="index.css" />
    <link rel="icon" href="/src/img/monster.png" />
  </head>
  <body>
    <nav>
      <span class="nav-logo">MONSTER REVIEWS</span>

      <div class="nav-links">
        <a href="#" class="active">Feed</a>
        <a href="#">Estatísticas</a>
      </div>

      <div class="nav-user" id="navUser">
        <div class="user-trigger" onclick="toggleDropdown()">
          <div class="user-avatar"></div>
          <span id="loggedUser">Meira</span>
          <svg class="chevron" viewBox="0 0 24 24">
            <polyline points="6 9 12 15 18 9" />
          </svg>
        </div>

        <input
          type="file"
          id="fileInput"
          accept="image/*"
          style="display: none"
        />

        <div class="user-dropdown">
          <div class="dropdown-header">
            <strong id="loggedUserEmail"></strong>
            <span></span>
          </div>
          <div class="dropdown-item">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
              <circle cx="12" cy="7" r="4" />
            </svg>
            Meu Perfil
          </div>
          <div class="dropdown-item">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <circle cx="12" cy="12" r="3" />
              <path
                d="M19.07 4.93A10 10 0 1 0 4.93 19.07 10 10 0 0 0 19.07 4.93z"
              />
            </svg>
            Configurações
          </div>
          <div class="dropdown-item">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M18 8h1a4 4 0 0 1 0 8h-1" />
              <path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z" />
              <line x1="6" y1="1" x2="6" y2="4" />
              <line x1="10" y1="1" x2="10" y2="4" />
              <line x1="14" y1="1" x2="14" y2="4" />
            </svg>
            Plano Pro
          </div>
          <div class="dropdown-sep"></div>
          <div id="btnSair" class="dropdown-item danger">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
              <polyline points="16 17 21 12 16 7" />
              <line x1="21" y1="12" x2="9" y2="12" />
            </svg>
            Sair
          </div>
        </div>
      </div>
    </nav>

    <div class="page">
      <section class="timeline">
        <div class="timeline-header">
          <h2>Timeline</h2>
          <button
            class="btn-registrar"
            onclick="
              localStorage.setItem('autorizacao', 1);
            "
          >
            Registrar latinha
          </button>
        </div>

        <div class="feed-container" id="feed-container"></div>
      </section>

      <div class="right-col">
        <div class="panel">
          <div class="panel-header">
            <h3>Liderança</h3>
            <span class="badge">Ao vivo</span>
          </div>
          <div class="panel-body" id="ranking-container">
            <p style="text-align: center; color: #888">
              Calculando latinhas...
            </p>
          </div>
        </div>

        <div class="filter-form">
          <div class="filter-header">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3" />
            </svg>
            <h3>Filtros</h3>
          </div>
          <div class="filter-body">
            <div class="field">
              <label>Buscar</label>
              <input type="text" placeholder="Sabor, marca…" />
            </div>
            <div class="field">
              <label>Categoria</label>
              <div class="select-wrap">
                <select>
                  <option>Todas as categorias</option>
                  <option>Pilsen</option>
                  <option>IPA</option>
                  <option>Weiss</option>
                  <option>Dark Lager</option>
                  <option>Zero Álcool</option>
                  <option>Seltzer</option>
                </select>
              </div>
            </div>
            <div class="field">
              <label>Período</label>
              <div class="date-row">
                <input type="date" />
                <input type="date" />
              </div>
            </div>
            <div class="field">
              <label>Valeu a pena?</label>
              <div class="tag-group" id="tagGroup">
                <span class="tag active" onclick="toggleTag(this)">Todos</span>
                <span class="tag" onclick="toggleTag(this)">✓ Sim</span>
                <span class="tag" onclick="toggleTag(this)">✗ Não</span>
              </div>
            </div>
            <div class="field">
              <label>Ordenar por</label>
              <div class="select-wrap">
                <select>
                  <option>Mais recentes</option>
                  <option>Melhor nota</option>
                  <option>Menor preço</option>
                  <option>Mais curtidos</option>
                </select>
              </div>
            </div>
            <div class="btn-group">
              <button class="btn btn-ghost">Limpar</button>
              <button class="btn btn-primary">Aplicar</button>
            </div>
          </div>
        </div>
      </div>
    </div>
    
    <div id="modal-container" class="modal-overlay" style="display: none;">
    <div class="modal-card">
    <button id="btn-fechar-modal" class="close-button">&times;</button>
    <h2>Registrar Nova <span>Latinha</span></h2>
    <p class="modal-subtitle">Adicione sua avaliação sobre o Monster da vez.</p>
    <form id="formAvaliacao">
      <div class="grid grid-two">
              <label>Monstro<input type="text" id="sujeito" name="sujeito" readonly></label>
              <label>Sabor do Monster<select name="sabor" placeholder="Ex: Ultra Paradise" required>
                  <option value="">Selecione um sabor</option>
                  <option value="branco">Branco</option>
                  <option value="mangoLoco">Mango Loco</option>
                  <option value="pacificPunch">Pacific Punch</option>
                  <option value="peachyKeen">Peachy Keen</option>
                  <option value="rioPunch">Rio Punch</option>
                  <option value="ultraFiestaMango">Ultra Fiesta Mango</option>
                  <option value="ultraStrawberry">Ultra Strawberry Dreams</option>
                  <option value="ultraViolet">Ultra Violet</option>
                  <option value="watermelon">Watermelon</option>
                  <option value="outro">Outro (anotar no grupo)</option>
                </select>
              </label>
            </div>
            <div class="grid grid-two">
              <label>Valor<input 
                  type="number"
                  name="valor"
                  step="0.01"
                  placeholder="R$12,99"
                  required
                />
              </label>
              <label>Nota (0 a 10)<input
                  type="number"
                  name="nota"
                  min="0"
                  max="10"
                  step="0.01"
                  placeholder="8.5"
                  required
                />
              </label>
            </div>
            <div class="grid grid-two">
              <fieldset class="radio-group">
                <legend>Valeu a pena?</legend>
                <label><input type="radio" name="valeu" value="sim" required />Sim</label>
                <label><input type="radio" name="valeu" value="nao" required />Não</label>
              </fieldset>
              <label>Foto do Monster<input type="file" name="foto" accept="image/*" required /></label>
            </div>
            <label>
              Review (opcional)
              <textarea
                name="review"
                placeholder="Conte o que achou do sabor, energia e sensação geral..."
              ></textarea>
            </label>
            <div class="footer">
              <button class="button" type="button" id="btnSair">Sair</button>
              <div class="hint">Rumo a 1k gastos em monsters!</div>
              <button class="button" type="submit" id="btnSubmit">Enviar avaliação</button>
            </div>
          </form> 
      </div>
    </div>
    
    <script src="index.js" defer></script>
    <script>
      // O evento de Sair fica aqui de forma limpa e isolada
      document
        .getElementById("btnSair")
        .addEventListener("click", (event) => {
          event.preventDefault();
          localStorage.removeItem("authToken");
          localStorage.removeItem("loggedUser");
          localStorage.removeItem("loggedEmail");
          window.location.href = "/login/login.html";
        });
    </script>
  </body>
</html>
